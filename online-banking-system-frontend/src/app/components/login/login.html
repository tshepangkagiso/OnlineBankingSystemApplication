<div class="login-container">
    <div class="login-card">
        <!-- Back Button -->
        <button class="back-btn" (click)="goBack()">
            <fa-icon [icon]="faArrowLeft"></fa-icon>
            Back to Home
        </button>

        <!-- Header -->
        <div class="login-header">
            <div class="logo">iNOVA</div>
            <div class="logo-sub">BANK</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Login Form -->
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <!-- Email Field -->
            <div class="form-group">
                <label>
                    <fa-icon [icon]="faEnvelope"></fa-icon>
                    Email Address
                </label>
                <input type="email"
                       name="email"
                       [(ngModel)]="request.email"
                       #email="ngModel"
                       placeholder="Enter your email"
                       required
                       email>
                <div *ngIf="email.invalid && email.touched" class="error">
                    <small *ngIf="email.errors?.['required']">Email is required</small>
                    <small *ngIf="email.errors?.['email']">Enter a valid email address</small>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label>
                    <fa-icon [icon]="faLock"></fa-icon>
                    Password
                </label>
                <input type="password"
                       name="password"
                       [(ngModel)]="request.password"
                       #password="ngModel"
                       placeholder="Enter your password"
                       required>
                <div *ngIf="password.invalid && password.touched" class="error">
                    <small *ngIf="password.errors?.['required']">Password is required</small>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="login-btn" [disabled]="loginForm.invalid || isLoading">
                <fa-icon [icon]="faArrowRightToBracket"></fa-icon>
                {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>
        </form>

        <!-- Register Link -->
        <div class="register-link">
            <p>Don't have an account? <a routerLink="/register">Open an Account</a></p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
        <div class="modal-container" [class.modal-success]="modalType === 'success'" [class.modal-error]="modalType === 'error'" (click)="$event.stopPropagation()">
            <button class="modal-close" (click)="closeModal()">
                <fa-icon [icon]="faTimes"></fa-icon>
            </button>
            <div class="modal-icon">
                <fa-icon *ngIf="modalType === 'success'" [icon]="faCheckCircle"></fa-icon>
                <fa-icon *ngIf="modalType === 'error'" [icon]="faExclamationCircle"></fa-icon>
            </div>
            <h3 class="modal-title">{{ modalTitle }}</h3>
            <p class="modal-message">{{ modalMessage }}</p>
            <button class="modal-btn" (click)="closeModal()">
                {{ modalType === 'success' ? 'Continue' : 'Try Again' }}
            </button>
        </div>
    </div>
</div>
